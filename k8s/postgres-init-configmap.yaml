apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: banking
data:
  init-multiple-databases.sh: |
    #!/bin/bash
    set -e
    set -u

    function create_database() {
      local database=$1
      echo "Creating database: $database"
      psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" -c "CREATE DATABASE $database;"
      psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" -c "GRANT ALL PRIVILEGES ON DATABASE $database TO $POSTGRES_USER;"
    }

    if [ -n "$POSTGRES_MULTIPLE_DATABASES" ]; then
      echo "Creating databases: $POSTGRES_MULTIPLE_DATABASES"
      for db in $(echo $POSTGRES_MULTIPLE_DATABASES | tr ',' ' '); do
        create_database $db
      done
      echo "All databases created."
    fi
