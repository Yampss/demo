apiVersion: apps/v1
kind: Deployment
metadata:
  name: transaction-service
  namespace: banking
spec:
  replicas: 2
  selector:
    matchLabels:
      app: transaction-service
  template:
    metadata:
      labels:
        app: transaction-service
    spec:
      containers:
        - name: transaction-service
          image: cazzzzz/banking-transaction-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3003
          env:
            - name: PORT
              value: "3003"
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: banking-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: banking-config
                  key: DB_PORT
            - name: DB_NAME
              value: "transactions_db"
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: banking-config
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: banking-secrets
                  key: db-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: banking-secrets
                  key: jwt-secret
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: banking-secrets
                  key: internal-api-key
            - name: ACCOUNT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: banking-config
                  key: ACCOUNT_SERVICE_URL


---
apiVersion: v1
kind: Service
metadata:
  name: transaction-service
  namespace: banking
spec:
  selector:
    app: transaction-service
  ports:
    - port: 3003
      targetPort: 3003
  type: ClusterIP
